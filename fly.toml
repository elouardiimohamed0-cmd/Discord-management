# fly.toml app configuration file generated for discord-management on 2026-06-17T21:40:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'discord-management'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASSETS_DIR = 'assets'
  DEFAULT_PERSONALITY = 'casablanca'
  DISCORD_STARTUP_DELAY = '15'
  PORT = '8000'
  PYTHONUNBUFFERED = '1'
  ROAST_FREQUENCY = '0.95'
  SCRAPE_INTERVAL_MINUTES = '10'
  SQLITE_PATH = '/data/rachad_data.db'
  SQUAD_FILE = 'squad.json'

[[mounts]]
  source = 'rachad_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
