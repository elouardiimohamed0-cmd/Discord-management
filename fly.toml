app = "discord-management"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  DISCORD_STARTUP_DELAY = "15"
  SCRAPE_INTERVAL_MINUTES = "10"
  DEFAULT_PERSONALITY = "casablanca"
  ROAST_FREQUENCY = "0.95"
  SQUAD_FILE = "squad.json"
  ASSETS_DIR = "assets"
  # Ephemeral SQLite — data survives machine restarts but NOT deploys
  # This is fine — bot re-scrapes within 10 minutes automatically
  SQLITE_PATH = "/app/rachad_data.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
