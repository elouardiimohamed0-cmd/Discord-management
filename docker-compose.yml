version: '3.8'

services:
  bot:
    build: .
    container_name: rachad-bot
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./squad.json:/app/squad.json
      - ./matches.db:/app/matches.db
      - ./memory.db:/app/memory.db
      - ./pct_cookies.json:/app/pct_cookies.json
    restart: unless-stopped
