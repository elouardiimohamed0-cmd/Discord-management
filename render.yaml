services:
  - type: web
    name: rachad-l3ergoni-bot
    runtime: docker
    plan: standard
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        value: "1514232870938480690"
      - key: GENERAL_CHANNEL_ID
        value: "1514232871701975041"
      - key: MATCH_CHANNEL_ID
        value: "1514967595646713867"
      - key: LEADERBORD_CHANNEL_ID
        value: "1515360379578875974"
      - key: GROQ_API_KEY
        sync: false
      - key: PCT_CLUB_URL
        value: "https://proclubstracker.com/club/1427607?platform=common-gen5&div=6"
      - key: PCT_PLATFORM
        value: common-gen5
      - key: CLUB_ID
        value: "1427607"
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PLAYWRIGHT_STEALTH
        value: "true"
      - key: PORT
        value: "8000"
      - key: SCRAPE_INTERVAL_MINUTES
        value: "5"
      - key: DEFAULT_PERSONALITY
        value: casablanca
      - key: ROAST_FREQUENCY
        value: "0.95"
      - key: SQUAD_FILE
        value: squad.json
      - key: MATCH_DB
        value: matches.db
      - key: MEMORY_DB
        value: memory.db
      - key: ASSETS_DIR
        value: assets
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
